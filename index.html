<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ART - Workspace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container" id="app">
    <header id="top-tabs" role="tablist" aria-label="Main Application Tabs">
        <button role="tab" aria-selected="true" id="tab-builder">Report Builder</button>
        <button role="tab" aria-selected="false" id="tab-editor">Editor</button>
        <button role="tab" aria-selected="false" id="tab-view">View Report</button>
    </header>

    <section id="dashboard" tabindex="-1">
        <h2>Dashboard</h2>
    </section>
    
    <div class="resizer" id="resizer-left"></div>

    <main id="main-content" tabindex="-1">
        <div id="main-inner">
            <h1>Report Builder</h1>
            <p>Configure your report here.</p>
        </div>
    </main>

    <div class="resizer" id="resizer-right"></div>

    <aside id="lookup-tool" tabindex="-1">
        <h2>WCAG Lookup</h2>
        <div class="tool-content">
            <div id="container">Loading criteria...</div>
        </div>
    </aside>
</div>

<script src="app.js"></script>
<script src="loader.js"></script>
</body>
</html>
