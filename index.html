<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ART - Accessibility Reporting Tool</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
<h1 class="sr-only">Accessibility Reporting Tool</h1>
<div id="announcer" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></div>

<div class="app-container">
    <nav aria-label="panel selector">
    <div id="top-tabs" role="tablist">
        <button role="tab" aria-selected="true" id="tab-welcome">Welcome</button> <button role="tab" aria-selected="false" id="tab-builder">Builder</button>
        <button role="tab" aria-selected="false" id="tab-editor">Editor</button>
        <button role="tab" aria-selected="false" id="tab-view">Report Viewer</button>
    </div>
</nav>
    <section id="dashboard" role="complementary" aria-labelledby="dash-heading">
        <h2 id="dash-heading">Dashboard</h2>
        
        <div class="action-group">
            <button id="btn-new-report">New Report</button>
            <button id="btn-open-report" title="Ctrl+O">Open Existing Report JSON File</button>
        </div>
        
        <div id="new-report-options">
            <label for="template-selection">Template Selection</label>
            <p id="template-selection-help" class="sr-only">Use Up and Down arrow keys to move through templates, then activate a template action button.</p>
            <select id="template-selection" aria-label="Template Selection" aria-describedby="template-selection-help">
                <option value="scratch">Start from Scratch</option>
            </select>
            <div class="template-actions" role="group" aria-label="Template actions">
                <button id="btn-template-create" type="button">Create Template</button>
                <button id="btn-template-use" type="button" hidden>Use Template</button>
                <button id="btn-template-open" type="button" hidden>View Template</button>
                <button id="btn-template-edit" type="button" hidden>Edit Template</button>
                <button id="btn-template-delete" type="button" hidden>Delete Template</button>
            </div>
            <div id="template-create-dialog" role="dialog" aria-modal="true" aria-labelledby="template-create-heading" hidden>
                <h3 id="template-create-heading">Create Template</h3>
                <label for="template-create-name">Template Name</label>
                <input id="template-create-name" type="text">
                <button id="btn-template-create-save" type="button">Create Template</button>
                <button id="btn-template-create-cancel" type="button">Cancel</button>
            </div>
            <div id="template-delete-dialog" role="alertdialog" aria-modal="true" aria-labelledby="template-delete-heading" aria-describedby="template-delete-message" hidden>
                <h3 id="template-delete-heading">Delete Template?</h3>
                <p id="template-delete-message"></p>
                <button id="btn-template-delete-yes" type="button">Delete</button>
                <button id="btn-template-delete-no" type="button">Cancel</button>
            </div>
            <div id="template-edit-confirm-dialog" role="alertdialog" aria-modal="true" aria-labelledby="template-edit-confirm-heading" aria-describedby="template-edit-confirm-message" hidden>
                <h3 id="template-edit-confirm-heading">Edit Template?</h3>
                <p id="template-edit-confirm-message"></p>
                <button id="btn-template-edit-yes" type="button">Create editable copy</button>
                <button id="btn-template-edit-no" type="button">Cancel</button>
            </div>
        </div>

        <div id="recent-reports-container" hidden>
            <label for="recent-reports-select">Select a Recent Report:</label>
            <select id="recent-reports-select"></select>
            
            <div class="report-actions" role="group" aria-label="Actions for selected report">
                <button id="btn-manage-recent">Manage Structure</button>
                <button id="btn-edit-recent">Edit Content</button>
                <button id="btn-view-recent" title="View/Export (Ctrl+S)">View/Export</button>
            </div>
        </div>
    </section>

    <main id="main-content" role="main" aria-label="main content">
        <div id="main-inner"></div>
    </main>

    <aside id="lookup-tool" aria-label="WCAG Lookup Tool">
        <h2>WCAG Lookup Tool</h2>
        <div id="container"></div>
    </aside>
</div>

<script type="module" src="state.js"></script>
<script type="module" src="navigation.js"></script>
<script type="module" src="dashboard.js"></script>
<script type="module" src="reportBuilder.js"></script>
    <script type="module" src="lookupTool.js"></script>
<script type="module" src="loader.js"></script>
</body>
</html>
