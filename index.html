<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ART - Accessibility Reporting Tool</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

<div class="app-container">
    <nav aria-label="main panel selector">
    <div id="top-tabs" role="tablist">
        <button role="tab" aria-selected="true" id="tab-builder">Builder</button>
        <button role="tab" aria-selected="false" id="tab-editor">Editor</button>
        <button role="tab" aria-selected="false" id="tab-view">View/Export</button>
    </div>
</nav>

    <section id="dashboard" role="complementary" aria-label="dashboard">
        <h2>Dashboard</h2>
        <p>Current Project: <span id="dash-title">Untitled</span></p>
    </section>

    <main id="main-content" aria-label="main content">
        <div id="main-inner"></div>
    </main>

    <aside id="lookup-tool" aria-label="WCAG Lookup Tool">
        <h2>WCAG Lookup Tool</h2>
        <div id="container">
            </div>
    </aside>
</div>

<script src="app.js"></script>
<script src="loader.js"></script>
</body>
</html>
